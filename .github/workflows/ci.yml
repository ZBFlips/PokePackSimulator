name: CI Checks

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Consistency Tests
        run: node tests/consistency.test.mjs

